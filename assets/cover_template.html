<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1080px; height:1440px; }
  body{
    font-family:"Microsoft YaHei","微软雅黑","PingFang SC","Noto Sans CJK SC",sans-serif;
    background:{{BG}};
    color:{{TITLE_FG}};
    position:relative;
    overflow:hidden;
  }
  .glow1{position:absolute;width:780px;height:780px;left:-220px;top:-180px;
    background:radial-gradient(circle,{{GLOW1}},transparent 70%);filter:blur(20px);}
  .glow2{position:absolute;width:660px;height:660px;right:-190px;bottom:-150px;
    background:radial-gradient(circle,{{GLOW2}},transparent 70%);filter:blur(20px);}
  .frame{position:absolute;inset:40px;border:2px solid {{BORDER}};border-radius:36px;}
  .wrap{position:relative;height:100%;padding:108px 96px;display:flex;flex-direction:column;}
  .toptag{display:inline-flex;align-items:center;gap:14px;align-self:flex-start;
    background:{{TAG_BG}};color:{{TAG_FG}};font-size:30px;font-weight:800;
    padding:16px 30px;border-radius:999px;letter-spacing:1px;}
  .toptag .dot{width:14px;height:14px;border-radius:50%;background:{{TAG_DOT}};}
  .eyebrow{margin-top:64px;font-size:56px;font-weight:800;color:{{HL}};line-height:1.3;}
  .title{margin-top:14px;font-size:104px;font-weight:800;line-height:1.22;letter-spacing:1px;color:{{TITLE_FG}};}
  .title .hl{color:{{HL}};}
  .sub{margin-top:46px;font-size:40px;line-height:1.5;color:{{SUB_FG}};font-weight:400;}
  .sub b{color:{{SUB_B}};font-weight:700;}
  .chips{margin-top:auto;display:flex;flex-wrap:wrap;gap:20px;}
  .chip{font-size:30px;font-weight:600;padding:16px 28px;border-radius:16px;
    background:{{CHIP_BG}};border:1px solid {{CHIP_BORDER}};color:{{CHIP_FG}};}
  .foot{margin-top:54px;display:flex;align-items:center;gap:22px;}
  .avatar{width:78px;height:78px;border-radius:50%;background:{{AVATAR_GRAD}};
    display:flex;align-items:center;justify-content:center;font-size:38px;font-weight:800;color:#fff;}
  .me{font-size:32px;font-weight:700;color:{{TITLE_FG}};}
  .me span{display:block;font-size:25px;font-weight:400;color:{{ME_SUB}};margin-top:4px;}
</style>
</head>
<body>
  <div class="glow1"></div>
  <div class="glow2"></div>
  <div class="frame"></div>
  <div class="wrap">
    <div class="toptag"><span class="dot"></span>{{TAG}}</div>
    {{EYEBROW_BLOCK}}
    <div class="title">{{TITLE}}</div>
    <div class="sub">{{SUBTITLE}}</div>
    <div class="chips">{{CHIPS}}</div>
    <div class="foot">
      <div class="avatar">{{AVATAR_TEXT}}</div>
      <div class="me">{{AUTHOR}}<span>{{AUTHOR_SUB}}</span></div>
    </div>
  </div>
</body>
</html>
